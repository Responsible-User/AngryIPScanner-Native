name: CI

on:
  push:
    branches: [master, mac-native, windows-native]
  pull_request:
    branches: [master]

jobs:
  go-test:
    name: Go Tests
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Run tests
        working-directory: libipscan
        run: go test ./... -v -race -count=1

      - name: Build shared library
        working-directory: libipscan
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            go build -buildmode=c-shared -o libipscan.dylib
          elif [ "$RUNNER_OS" = "Windows" ]; then
            go build -buildmode=c-shared -o libipscan.dll
          else
            go build -buildmode=c-shared -o libipscan.so
          fi
        shell: bash

  go-vet:
    name: Go Vet & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Vet
        working-directory: libipscan
        run: go vet ./...

  mac-build:
    name: macOS App Build
    runs-on: macos-latest
    needs: go-test
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Build Go dylib
        working-directory: libipscan
        run: |
          go build -buildmode=c-shared -o ../MacApp/Bridge/libipscan.dylib
          install_name_tool -id "@rpath/libipscan.dylib" ../MacApp/Bridge/libipscan.dylib

      - name: Generate Xcode project
        working-directory: MacApp
        run: xcodegen generate

      - name: Build Swift app
        working-directory: MacApp
        run: >
          xcodebuild -scheme AngryIPScanner -configuration Debug build
          CODE_SIGN_IDENTITY="-"
          CODE_SIGNING_REQUIRED=NO
          CODE_SIGN_ENTITLEMENTS=""
          ENABLE_HARDENED_RUNTIME=NO
          DEVELOPMENT_TEAM=""
