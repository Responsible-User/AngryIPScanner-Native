name: AngryIPScanner
options:
  bundleIdPrefix: toys.eat
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  AngryIPScanner:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Bridge
        excludes:
          - "*.dylib"
          - "*.h"
      - path: Views
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: toys.eat.aipscanner
        PRODUCT_NAME: Angry IP Scanner
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_GENERATION_MODE: GeneratedByXcode
        MARKETING_VERSION: "4.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_OBJC_BRIDGING_HEADER: Bridge/AngryIPScanner-Bridging-Header.h
        LIBRARY_SEARCH_PATHS:
          - "$(PROJECT_DIR)/Bridge"
        HEADER_SEARCH_PATHS:
          - "$(PROJECT_DIR)/Bridge"
        OTHER_LDFLAGS:
          - "-lipscan"
          - "-rpath"
          - "@executable_path/../Frameworks"
        SWIFT_STRICT_CONCURRENCY: complete
        ENABLE_APP_SANDBOX: false
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Developer ID Application"
        DEVELOPMENT_TEAM: LXEJ8DA986
        CODE_SIGN_ENTITLEMENTS: AngryIPScanner.entitlements
        OTHER_CODE_SIGN_FLAGS: "--timestamp"
      debug:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
      release:
        CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
    postCompileScripts:
      - script: |
          mkdir -p "${BUILT_PRODUCTS_DIR}/${FRAMEWORKS_FOLDER_PATH}"
          cp "${PROJECT_DIR}/Bridge/libipscan.dylib" "${BUILT_PRODUCTS_DIR}/${FRAMEWORKS_FOLDER_PATH}/"
          install_name_tool -id "@rpath/libipscan.dylib" "${BUILT_PRODUCTS_DIR}/${FRAMEWORKS_FOLDER_PATH}/libipscan.dylib"
          # Sign the Go dylib with the same team identity as the app
          if [ "${CONFIGURATION}" = "Release" ]; then
            codesign --force --options runtime --timestamp --sign "Developer ID Application: Jacob Braun (LXEJ8DA986)" "${BUILT_PRODUCTS_DIR}/${FRAMEWORKS_FOLDER_PATH}/libipscan.dylib"
          else
            codesign --force --sign "Apple Development: Jacob Braun (7LEK525S2S)" "${BUILT_PRODUCTS_DIR}/${FRAMEWORKS_FOLDER_PATH}/libipscan.dylib"
          fi
        name: "Copy and sign libipscan.dylib"
